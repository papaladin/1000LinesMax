<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Emoji Empire</title>
<style>
body{font-family:monospace;background:#000;color:#fff;margin:0;padding:0;height:100vh;display:flex;flex-direction:column;touch-action:manipulation;overflow:hidden}
#top-hud{flex-shrink:0;background:#111;border-bottom:1px solid #444;padding:6px 10px;font-size:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
#game-container{flex:1;position:relative;overflow:hidden;min-height:0}
#game{position:absolute;display:grid;grid-template-columns:repeat(40,1fr);grid-template-rows:repeat(40,1fr);gap:0;font-size:12px;line-height:1;transform-origin:0 0;touch-action:none}
.cell{aspect-ratio:1/1;display:flex;justify-content:center;align-items:center;position:relative}
.unit-count{position:absolute;bottom:-5px;right:-5px;font-size:8px;color:#fff;text-shadow:0 0 2px #000;background:rgba(0,0,0,0.6);border-radius:50%;width:14px;height:14px;display:flex;justify-content:center;align-items:center}
.dmg-popup{position:absolute;top:0;left:50%;transform:translate(-50%,0);color:#ff5b5b;font-size:10px;font-weight:bold;text-shadow:0 0 3px #000;pointer-events:none;z-index:20;animation:floatUp 0.8s ease-out forwards}
@keyframes floatUp{
  0%{opacity:1;transform:translate(-50%,0);}
  100%{opacity:0;transform:translate(-50%,-22px);}
}
.hp-bar-bg{position:absolute;bottom:1px;left:8%;width:84%;height:3px;background:rgba(0,0,0,0.6);border-radius:2px;overflow:hidden;z-index:5}
.hp-bar-fill{height:100%}
#ui{background:#222;padding:8px 10px calc(20px + env(safe-area-inset-bottom, 0px)) 10px;border-top:1px solid #444;display:flex;flex-direction:column;gap:8px;max-height:42vh;overflow-y:auto}
#worker-panel{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;align-items:center;background:#1a1a1a;padding:4px 6px;border-radius:4px}
#staging{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#1a1a1a;padding:4px 6px;border-radius:4px}
#controls{display:flex;gap:5px;flex-wrap:wrap}
.section-label{font-size:10px;color:#888;text-transform:uppercase;margin-top:2px}
.button{background:#333;border:1px solid #444;color:#fff;padding:5px 9px;cursor:pointer;border-radius:3px;font-size:12px}
.button:disabled{opacity:0.4;cursor:not-allowed}
.zoom-button{padding:8px;font-size:16px}
#zoom-in,#zoom-out{position:fixed;bottom:calc(10px + env(safe-area-inset-bottom, 0px));right:10px;z-index:100}
#zoom-in{top:auto;bottom:calc(60px + env(safe-area-inset-bottom, 0px))}
.building.player{color:#4af}.building.enemy{color:#f66}
.unit.player{color:#8cf}.unit.enemy{color:#f88}
@media (max-width:768px){
  #game{font-size:8px}
  .button{padding:4px 7px;font-size:10px}
  .unit-count{font-size:6px;width:10px;height:10px}
}
</style>
</head>
<body>
<div id="top-hud">
  <span>🍎<span id="player-food">0</span></span>
  <span>🪵<span id="player-wood">0</span></span>
  <span>🟡<span id="player-gold">0</span></span>
  <span>👥<span id="player-pop">0/10</span></span>
</div>
<div id="game-container">
  <div id="game"></div>
</div>
<div id="ui">
  <div class="section-label">Workers</div>
  <div id="worker-panel"></div>

  <div class="section-label">Staging (max 10/squad, auto-deploys at cap)</div>
  <div id="staging">
    <div id="staging-units" style="display:flex;gap:10px;flex-wrap:wrap"></div>
    <button class="button" onclick="deployAll()">Deploy All</button>
  </div>

  <div class="section-label">Economy</div>
  <div id="controls">
    <button class="button" id="train-worker" onclick="trainWorker()">Train Worker (🍎10)</button>
    <button class="button" id="build-house" onclick="build('house')">Build House (🪵30 🟡20, +5 pop)</button>
  </div>

  <div class="section-label">Base (build once each, 2x2 cluster)</div>
  <div id="controls">
    <button class="button" id="build-casern" onclick="build('casern')">Build Casern (🪵50 🟡30)</button>
    <button class="button" id="build-castle" onclick="build('castle')">Build Castle (🪵80 🟡100)</button>
    <button class="button" id="build-mageTower" onclick="build('mageTower')">Build Tower (🪵40 🟡60)</button>
  </div>

  <div class="section-label">Army</div>
  <div id="controls">
    <button class="button" id="train-soldier" onclick="produce('soldier')">Train Soldier 🪖 (🍎20 🟡10)</button>
    <button class="button" id="train-mage" onclick="produce('mage')">Train Mage 🧙 (🍎15 🟡20)</button>
    <button class="button" id="train-catapult" onclick="produce('catapult')">Train Catapult 🪨 (🪵40 🟡30)</button>
  </div>
</div>
<button id="zoom-in" class="zoom-button" onclick="zoomIn()">+</button>
<button id="zoom-out" class="zoom-button" onclick="zoomOut()">−</button>

<script>
// ===== CONSTANTS =====
const W=40, H=40;
const MOVE_RETRY=0.15;
const AI_DECISION_INTERVAL=3;
const RES_INTERVAL={food:2, wood:5, gold:5};
const RES_AMOUNT={food:4, wood:5, gold:3};
const WORKER_COST={food:10};

const UNIT_STATS = {
  soldier:  {hp:10, damage:3, emoji:'🪖', cost:{food:20, gold:10}, requiredBuilding:'casern',    moveTime:0.6, atkTime:1.0, range:1},
  mage:     {hp:8,  damage:4, emoji:'🧙', cost:{food:15, gold:20}, requiredBuilding:'mageTower', moveTime:0.7, atkTime:1.2, range:2},
  catapult: {hp:16, damage:6, emoji:'🪨', cost:{wood:40, gold:30}, requiredBuilding:'castle',    moveTime:1.0, atkTime:1.5, range:1, vsBuildingMult:2.5}
};
const BUILDING_STATS = {
  townhall:  {hp:300, emoji:'🏰'},
  casern:    {hp:150, emoji:'🏟️'},
  castle:    {hp:200, emoji:'🏯'},
  mageTower: {hp:150, emoji:'🗼'},
  house:     {emoji:'🏠', population:5}
};
const BUILDING_COSTS = {
  casern:    {wood:50, gold:30},
  castle:    {wood:80, gold:100},
  mageTower: {wood:40, gold:60},
  house:     {wood:30, gold:20}
};
// fixed 2x2 cluster offsets from townhall
const BASE_SLOTS = {
  casern:    {dx:1, dy:0},
  castle:    {dx:0, dy:1},
  mageTower: {dx:1, dy:1}
};

// ===== GAME STATE =====
const game = {
  player: null,
  enemy: null,
  zoom: 1,
  offset: {x:0, y:0},
  isDragging: false,
  dragStart: {x:0, y:0},
  lastTs: 0,
  gameOver: false,
  cellEls: null
};

function newSide(tx, ty){
  const townhall = {x:tx, y:ty, hp:BUILDING_STATS.townhall.hp, type:'townhall'};
  return {
    townhall,
    buildings: [townhall],
    units: [],
    staging: {soldier:0, mage:0, catapult:0},
    workers: {idle:0, food:0, wood:0, gold:0},
    resources: {food:150, wood:150, gold:100},
    resTimers: {food:0, wood:0, gold:0},
    population: {current:0, max:10},
    aiTimer: 0
  };
}

function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function randomBasePositions(){
  const margin=3, maxc=W-margin-2;
  let p1,p2, tries=0;
  do{
    p1 = {x:randInt(margin,maxc), y:randInt(margin,maxc)};
    p2 = {x:randInt(margin,maxc), y:randInt(margin,maxc)};
    tries++;
  } while(dist(p1,p2) < 20 && tries < 500);
  return [p1,p2];
}

// ===== INITIALIZATION =====
function init(){
  const [p1,p2] = randomBasePositions();
  game.player = newSide(p1.x, p1.y);
  game.enemy = newSide(p2.x, p2.y);
  game.gameOver = false;
  game.zoom = 1;
  game.offset = {x:0, y:0};
  render();
}

// ===== GAME LOOP =====
function gameLoop(ts){
  const delta = Math.min((ts - (game.lastTs || ts)) / 1000, 0.25);
  game.lastTs = ts;
  try{
    if(!game.gameOver && !game.isDragging){
      updateResources(delta);
      moveUnits(delta);
      checkCombat(delta);
      updateAI(delta);
    }
    render();
  } catch(e){
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// ===== RESOURCE SYSTEM =====
function updateResources(delta){
  [game.player, game.enemy].forEach(side=>{
    ['food','wood','gold'].forEach(r=>{
      const workers = side.workers[r];
      if(workers > 0){
        side.resTimers[r] += delta;
        const interval = RES_INTERVAL[r], amount = RES_AMOUNT[r];
        while(side.resTimers[r] >= interval){
          side.resources[r] += amount * workers;
          side.resTimers[r] -= interval;
        }
      }
    });
  });
}

// ===== COLLISION =====
function isCellFree(x, y, side){
  if(x < 0 || x >= W || y < 0 || y >= H) return false;
  const other = side === game.player ? game.enemy : game.player;
  if(side.buildings.some(b => b.x===x && b.y===y && b.hp>0)) return false;
  if(other.buildings.some(b => b.x===x && b.y===y && b.hp>0)) return false;
  if(side.units.some(u => u.x===x && u.y===y && u.hp>0)) return false;
  if(other.units.some(u => u.x===x && u.y===y && u.hp>0)) return false;
  return true;
}

// ===== MOVEMENT =====
function stepToward(unit, target, side){
  const ddx = Math.sign(target.x - unit.x), ddy = Math.sign(target.y - unit.y);
  const cands = [];
  if(ddx || ddy) cands.push([ddx,ddy]);
  if(ddx) cands.push([ddx,0]);
  if(ddy) cands.push([0,ddy]);
  if(ddx){ cands.push([ddx,1]); cands.push([ddx,-1]); }
  if(ddy){ cands.push([1,ddy]); cands.push([-1,ddy]); }
  cands.push([1,0],[-1,0],[0,1],[0,-1]);
  for(const [cx,cy] of cands){
    const nx = unit.x+cx, ny = unit.y+cy;
    if(isCellFree(nx, ny, side)) return {x:nx, y:ny};
  }
  return null;
}

function moveUnits(delta){
  [[game.player, game.enemy], [game.enemy, game.player]].forEach(([side, foe])=>{
    side.units.forEach(unit=>{
      if(unit.hp <= 0) return;
      const stats = UNIT_STATS[unit.type];
      const engaging = foe.units.some(u => u.hp>0 && Math.max(Math.abs(u.x-unit.x), Math.abs(u.y-unit.y)) <= stats.range);
      if(engaging) return;

      unit.moveCd -= delta;
      if(unit.moveCd > 0) return;

      const target = foe.townhall;
      if(Math.max(Math.abs(unit.x-target.x), Math.abs(unit.y-target.y)) <= stats.range){
        unit.moveCd = 0.3;
        return;
      }
      const next = stepToward(unit, target, side);
      if(next){ unit.x = next.x; unit.y = next.y; unit.moveCd = stats.moveTime; }
      else unit.moveCd = MOVE_RETRY;
    });
  });
}

// ===== COMBAT SYSTEM =====
function currentCount(unit){
  return Math.max(0, Math.ceil(unit.hp / UNIT_STATS[unit.type].hp));
}

function applyDamageToUnit(unit, dmg, side){
  showDamagePopup(unit.x, unit.y, dmg);
  const before = currentCount(unit);
  unit.hp = Math.max(0, unit.hp - dmg);
  const after = currentCount(unit);
  const lost = before - after;
  if(lost > 0) side.population.current = Math.max(0, side.population.current - lost);
}

// floating "-x" popup, positioned as a % of the fx-layer so it survives
// zoom/pan and doesn't get wiped by the per-frame grid repaint (unlike a
// cell's own textContent, which is reset every frame).
function showDamagePopup(x, y, amount){
  if(!game.fxLayer || x<0 || x>=W || y<0 || y>=H) return;
  const span = document.createElement('span');
  span.className = 'dmg-popup';
  span.textContent = '-' + Math.max(1, Math.round(amount));
  span.style.left = ((x + 0.5) / W * 100) + '%';
  span.style.top = (y / H * 100) + '%';
  game.fxLayer.appendChild(span);
  setTimeout(() => { if(span.parentNode) span.parentNode.removeChild(span); }, 800);
}

function checkCombat(delta){
  [[game.player, game.enemy], [game.enemy, game.player]].forEach(([side, foe])=>{
    side.units.forEach(unit=>{
      if(unit.hp <= 0) return;
      const stats = UNIT_STATS[unit.type];
      unit.atkCd -= delta;

      let target = foe.units.find(u => u.hp>0 && Math.max(Math.abs(u.x-unit.x), Math.abs(u.y-unit.y)) <= stats.range);
      let targetIsBuilding = false;
      if(!target){
        target = foe.buildings.find(b => b.hp>0 && Math.max(Math.abs(b.x-unit.x), Math.abs(b.y-unit.y)) <= stats.range);
        targetIsBuilding = true;
      }
      if(target && unit.atkCd <= 0){
        let dmg = currentCount(unit) * stats.damage;
        if(targetIsBuilding && stats.vsBuildingMult) dmg *= stats.vsBuildingMult;
        if(targetIsBuilding){
          target.hp -= dmg;
          showDamagePopup(target.x, target.y, dmg);
          if(target.hp <= 0 && target.type === 'townhall'){
            gameOver(side === game.player);
          }
        } else {
          applyDamageToUnit(target, dmg, foe);
        }
        unit.atkCd = stats.atkTime;
      }
    });
  });

  [game.player, game.enemy].forEach(s=>{
    s.units = s.units.filter(u => u.hp > 0);
    s.buildings = s.buildings.filter(b => b.hp > 0);
  });
}

function gameOver(playerWon){
  if(game.gameOver) return;
  game.gameOver = true;
  setTimeout(()=>{
    alert(playerWon ? '🎉 VICTORY! Enemy townhall destroyed!' : '💀 DEFEAT! Your townhall was destroyed!');
    init();
  }, 100);
}

// ===== BUILDING / PRODUCTION (player) =====
function build(type){
  const side = game.player;
  const cost = BUILDING_COSTS[type];
  if(!cost) return;
  if(type !== 'house' && side.buildings.some(b => b.type === type)){
    alert('Already built!');
    return;
  }
  if(side.resources.wood < cost.wood || side.resources.gold < cost.gold){
    alert('Not enough resources!');
    return;
  }
  side.resources.wood -= cost.wood;
  side.resources.gold -= cost.gold;

  if(type === 'house'){
    side.population.max += BUILDING_STATS.house.population;
    render();
    return;
  }
  const slot = BASE_SLOTS[type];
  const bx = side.townhall.x + slot.dx, by = side.townhall.y + slot.dy;
  side.buildings.push({x:bx, y:by, hp:BUILDING_STATS[type].hp, type});
  render();
}

function trainWorker(){
  const side = game.player;
  if(side.population.current >= side.population.max){ alert('Population cap reached! Build a house.'); return; }
  if(side.resources.food < WORKER_COST.food){ alert('Not enough food!'); return; }
  side.resources.food -= WORKER_COST.food;
  side.population.current++;
  side.workers.idle++;
  render();
}

function assignWorker(res, delta){
  const side = game.player;
  if(delta > 0){
    if(side.workers.idle <= 0) return;
    side.workers.idle--; side.workers[res]++;
  } else {
    if(side.workers[res] <= 0) return;
    side.workers[res]--; side.workers.idle++;
  }
  render();
}

function produce(type){
  const side = game.player;
  const stats = UNIT_STATS[type];
  if(side.population.current >= side.population.max){ alert('Population cap reached! Build a house.'); return; }
  if(!side.buildings.some(b => b.type === stats.requiredBuilding)){
    alert(`Need a ${stats.requiredBuilding} to train ${type}!`);
    return;
  }
  const cost = stats.cost;
  if(side.resources.food < (cost.food||0) || side.resources.gold < (cost.gold||0) || side.resources.wood < (cost.wood||0)){
    alert('Not enough resources!');
    return;
  }
  side.resources.food -= cost.food||0;
  side.resources.gold -= cost.gold||0;
  side.resources.wood -= cost.wood||0;
  side.population.current++;
  side.staging[type]++;
  if(side.staging[type] >= 10) deploySquad(side, type);
  render();
}

function findSpawnSpot(side){
  for(let r=0; r<8; r++){
    for(let dx=-r; dx<=r; dx++){
      for(let dy=-r; dy<=r; dy++){
        const x = side.townhall.x+dx, y = side.townhall.y+dy;
        if(isCellFree(x, y, side)) return {x, y};
      }
    }
  }
  return null;
}

function deploySquad(side, type){
  const count = side.staging[type];
  if(count <= 0) return;
  const spot = findSpawnSpot(side);
  if(!spot) return;
  side.units.push({type, x:spot.x, y:spot.y, hp:count*UNIT_STATS[type].hp, moveCd:0, atkCd:0});
  side.staging[type] = 0;
}

function deployAll(){
  ['soldier','mage','catapult'].forEach(t => deploySquad(game.player, t));
  render();
}

// ===== ENEMY AI =====
function assignWorkerSide(side, res, delta){
  if(delta > 0){
    if(side.workers.idle <= 0) return;
    side.workers.idle--; side.workers[res]++;
  } else {
    if(side.workers[res] <= 0) return;
    side.workers[res]--; side.workers.idle++;
  }
}

function updateAI(delta){
  const side = game.enemy;
  side.aiTimer += delta;
  if(side.aiTimer < AI_DECISION_INTERVAL) return;
  side.aiTimer = 0;

  let guard = 0;
  while(side.workers.idle > 0 && guard++ < 20){
    const counts = ['food','wood','gold'].map(r => ({r, c: side.workers[r]}));
    counts.sort((a,b) => a.c - b.c);
    assignWorkerSide(side, counts[0].r, 1);
  }

  const order = ['casern','castle','mageTower'];
  for(const t of order){
    if(!side.buildings.some(b => b.type === t)){
      const cost = BUILDING_COSTS[t];
      if(side.resources.wood >= cost.wood && side.resources.gold >= cost.gold){
        side.resources.wood -= cost.wood; side.resources.gold -= cost.gold;
        const slot = BASE_SLOTS[t];
        side.buildings.push({x:side.townhall.x+slot.dx, y:side.townhall.y+slot.dy, hp:BUILDING_STATS[t].hp, type:t});
      }
      break;
    }
  }

  if(side.population.current >= side.population.max - 2){
    const cost = BUILDING_COSTS.house;
    if(side.resources.wood >= cost.wood && side.resources.gold >= cost.gold){
      side.resources.wood -= cost.wood; side.resources.gold -= cost.gold;
      side.population.max += BUILDING_STATS.house.population;
    }
  }

  const totalWorkers = side.workers.idle + side.workers.food + side.workers.wood + side.workers.gold;
  if(totalWorkers < 8 && side.population.current < side.population.max && side.resources.food >= WORKER_COST.food){
    side.resources.food -= WORKER_COST.food;
    side.population.current++;
    side.workers.idle++;
  }

  const options = ['soldier','mage','catapult'].filter(t => side.buildings.some(b => b.type === UNIT_STATS[t].requiredBuilding));
  if(options.length && side.population.current < side.population.max){
    const type = options[randInt(0, options.length-1)];
    const cost = UNIT_STATS[type].cost;
    if(side.resources.food >= (cost.food||0) && side.resources.gold >= (cost.gold||0) && side.resources.wood >= (cost.wood||0)){
      side.resources.food -= cost.food||0;
      side.resources.gold -= cost.gold||0;
      side.resources.wood -= cost.wood||0;
      side.population.current++;
      side.staging[type]++;
      if(side.staging[type] >= 10) deploySquad(side, type);
    }
  }

  ['soldier','mage','catapult'].forEach(t=>{
    if(side.staging[t] >= 4 && Math.random() < 0.5) deploySquad(side, t);
  });
}

// ===== RENDERING =====
function buildGrid(container){
  container.innerHTML = '';
  game.cellEls = [];
  for(let y=0; y<H; y++){
    const row = [];
    for(let x=0; x<W; x++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      container.appendChild(cell);
      row.push(cell);
    }
    game.cellEls.push(row);
  }
  // overlay spanning the whole grid, used only for damage popups so they
  // aren't wiped out by the per-frame cell repaint in paintGrid()
  const fx = document.createElement('div');
  fx.style.gridColumn = '1 / -1';
  fx.style.gridRow = '1 / -1';
  fx.style.position = 'relative';
  fx.style.pointerEvents = 'none';
  container.appendChild(fx);
  game.fxLayer = fx;
}

function paintGrid(){
  for(let y=0; y<H; y++){
    for(let x=0; x<W; x++){
      const cell = game.cellEls[y][x];
      cell.textContent = '🌿';
      cell.className = 'cell';
    }
  }
  const paintBuildings = (list, cls) => list.forEach(o=>{
    if(o.x<0||o.x>=W||o.y<0||o.y>=H) return;
    const cell = game.cellEls[o.y][o.x];
    cell.textContent = BUILDING_STATS[o.type].emoji;
    cell.className = 'cell building ' + cls;
    const maxHp = BUILDING_STATS[o.type].hp;
    if(maxHp){
      const pct = Math.max(0, Math.min(100, o.hp / maxHp * 100));
      const bg = document.createElement('div');
      bg.className = 'hp-bar-bg';
      const fill = document.createElement('div');
      fill.className = 'hp-bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = pct > 50 ? '#4f8' : pct > 25 ? '#fd4' : '#f55';
      bg.appendChild(fill);
      cell.appendChild(bg);
    }
  });
  paintBuildings(game.player.buildings, 'player');
  paintBuildings(game.enemy.buildings, 'enemy');

  const paintUnits = (list, cls) => list.forEach(u=>{
    if(u.x<0||u.x>=W||u.y<0||u.y>=H) return;
    const cell = game.cellEls[u.y][u.x];
    cell.textContent = UNIT_STATS[u.type].emoji;
    cell.className = 'cell unit ' + cls;
    const c = currentCount(u);
    if(c > 1){
      const span = document.createElement('span');
      span.className = 'unit-count';
      span.textContent = c;
      cell.appendChild(span);
    }
  });
  paintUnits(game.player.units, 'player');
  paintUnits(game.enemy.units, 'enemy');
}

function renderHUD(){
  const f = v => Math.floor(v);
  document.getElementById('player-food').textContent = f(game.player.resources.food);
  document.getElementById('player-wood').textContent = f(game.player.resources.wood);
  document.getElementById('player-gold').textContent = f(game.player.resources.gold);
  document.getElementById('player-pop').textContent = `${game.player.population.current}/${game.player.population.max}`;
}

// Worker/staging panels are built ONCE and only their text/disabled state
// is updated every frame afterwards. Rebuilding these buttons via
// innerHTML on every animation frame (~60/sec) was the actual cause of
// "buttons doing nothing": replacing a button's DOM node while a tap/click
// is still in flight (especially on mobile Safari) silently drops the
// click event before it ever fires.
function buildWorkerPanel(){
  const el = document.getElementById('worker-panel');
  el.innerHTML = `
    <span>👷 Idle: <b id="w-idle">0</b></span>
    <span>🍎 <b id="w-food">0</b> <button class="button" onclick="assignWorker('food',1)">+</button><button class="button" onclick="assignWorker('food',-1)">-</button></span>
    <span>🪵 <b id="w-wood">0</b> <button class="button" onclick="assignWorker('wood',1)">+</button><button class="button" onclick="assignWorker('wood',-1)">-</button></span>
    <span>🟡 <b id="w-gold">0</b> <button class="button" onclick="assignWorker('gold',1)">+</button><button class="button" onclick="assignWorker('gold',-1)">-</button></span>
  `;
}
function renderWorkers(){
  const w = game.player.workers;
  document.getElementById('w-idle').textContent = w.idle;
  document.getElementById('w-food').textContent = w.food;
  document.getElementById('w-wood').textContent = w.wood;
  document.getElementById('w-gold').textContent = w.gold;
}

function buildStagingPanel(){
  const el = document.getElementById('staging-units');
  el.innerHTML = '';
  ['soldier','mage','catapult'].forEach(type=>{
    const span = document.createElement('span');
    span.innerHTML = `${UNIT_STATS[type].emoji} <b id="stage-${type}">0</b>/10 `;
    const btn = document.createElement('button');
    btn.className = 'button';
    btn.id = 'deploy-' + type;
    btn.textContent = 'Deploy';
    btn.onclick = () => { deploySquad(game.player, type); };
    span.appendChild(btn);
    el.appendChild(span);
  });
}
function renderStaging(){
  ['soldier','mage','catapult'].forEach(type=>{
    const n = game.player.staging[type];
    document.getElementById('stage-'+type).textContent = n;
    document.getElementById('deploy-'+type).disabled = n === 0;
  });
}

function canAfford(side, cost){
  return side.resources.wood >= (cost.wood||0) && side.resources.gold >= (cost.gold||0) && side.resources.food >= (cost.food||0);
}

function updateButtons(){
  const p = game.player;
  const setBtn = (id, disabled) => { const b = document.getElementById(id); if(b) b.disabled = disabled; };
  setBtn('build-casern', p.buildings.some(b=>b.type==='casern') || !canAfford(p, BUILDING_COSTS.casern));
  setBtn('build-castle', p.buildings.some(b=>b.type==='castle') || !canAfford(p, BUILDING_COSTS.castle));
  setBtn('build-mageTower', p.buildings.some(b=>b.type==='mageTower') || !canAfford(p, BUILDING_COSTS.mageTower));
  setBtn('build-house', !canAfford(p, BUILDING_COSTS.house));
  setBtn('train-worker', p.population.current >= p.population.max || p.resources.food < WORKER_COST.food);
  ['soldier','mage','catapult'].forEach(t=>{
    const stats = UNIT_STATS[t];
    const dis = p.population.current >= p.population.max || !p.buildings.some(b=>b.type===stats.requiredBuilding) || !canAfford(p, stats.cost);
    setBtn('train-'+t, dis);
  });
}

function render(){
  const gameDiv = document.getElementById('game');
  gameDiv.style.transform = `scale(${game.zoom}) translate(${game.offset.x}px, ${game.offset.y}px)`;
  if(!game.cellEls) buildGrid(gameDiv);
  if(!game.uiBuilt){ buildWorkerPanel(); buildStagingPanel(); game.uiBuilt = true; }
  paintGrid();
  renderHUD();
  renderWorkers();
  renderStaging();
  updateButtons();
}

// ===== ZOOM/PAN =====
function zoomIn(){ game.zoom = Math.min(game.zoom + 0.2, 2); render(); }
function zoomOut(){ game.zoom = Math.max(game.zoom - 0.2, 0.5); render(); }

document.getElementById('game').addEventListener('mousedown', (e)=>{
  game.isDragging = true;
  game.dragStart = {x: e.clientX - game.offset.x, y: e.clientY - game.offset.y};
});
document.addEventListener('mousemove', (e)=>{
  if(!game.isDragging) return;
  game.offset.x = e.clientX - game.dragStart.x;
  game.offset.y = e.clientY - game.dragStart.y;
  render();
});
document.addEventListener('mouseup', ()=>{ game.isDragging = false; });

document.getElementById('game').addEventListener('touchstart', (e)=>{
  game.isDragging = true;
  game.dragStart = {x: e.touches[0].clientX - game.offset.x, y: e.touches[0].clientY - game.offset.y};
  e.preventDefault();
});
document.addEventListener('touchmove', (e)=>{
  if(!game.isDragging) return;
  game.offset.x = e.touches[0].clientX - game.dragStart.x;
  game.offset.y = e.touches[0].clientY - game.dragStart.y;
  render();
  e.preventDefault();
});
document.addEventListener('touchend', ()=>{ game.isDragging = false; });

// ===== BOOTSTRAP =====
init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
