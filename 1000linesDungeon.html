<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test: CDN Check</title>
</head>
<body>
  <h1>Testing CDN Loading</h1>
  <script src="https://cdn.jsdelivr.net/npm/rot-js@2.2.0/rot.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chance@1.1.8/chance.min.js"></script>
  <script>
    if (typeof ROT !== 'undefined' && typeof Chance !== 'undefined') {
      document.body.innerHTML += "<p style='color:green;'>✅ CDNs loaded! Game should work.</p>";
    } else {
      document.body.innerHTML += "<p style='color:red;'>❌ CDNs blocked! Use the inlined version.</p>";
    }
  </script>
</body>
</html>
