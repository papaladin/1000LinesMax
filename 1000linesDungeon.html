<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Dungeon Crawler</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;overflow-x:hidden}
body{font-family:monospace;background:#000;color:#fff;margin:0;padding:10px;touch-action:manipulation}
#game{
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 0;
  width: 100%;
  margin: 5px 0;
  overflow: hidden;
}
.cell {
  display: flex;
  justify-content: center;
  align-items: center;
  aspect-ratio: 1/1;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  font-size: 4.6vw;
  line-height: 1;
}
.cell > span{
  display:inline-block;
  max-width:100%;
  overflow:hidden;
  text-align:center;
  transform:scale(1);
}
#stats{margin-bottom:5px;font-size:4vw}
#stats2{margin-bottom:5px;font-size:3.2vw;color:#aaf}
#legend{font-size:3vw;margin-bottom:5px;color:#888}
#log{height:20vw;overflow-y:auto;margin-bottom:5px;font-size:3vw;min-height:8em}
#action-bar{display:flex;flex-direction:column;gap:1vw;padding:1vw;background:#222;position:fixed;bottom:0;left:0;right:0}
#row-1{display:flex;justify-content:center;gap:1vw}
#row-2{display:flex;justify-content:space-between;gap:1vw}
.action-button{flex:1;padding:2vw;background:#333;border:1px solid #444;color:#fff;cursor:pointer;font-size:4vw;min-width:12vw}
.wall{color:#8B4513}.floor{color:#333}.player{color:#ff0}.enemy{color:#f00}.stairs{color:#0ff}.torch{color:#ff4500;animation:torchGlow 1.5s infinite}.item{color:#0f0}.boss{color:#f0f}
@keyframes torchGlow{
  0%{text-shadow:0 0 5px #ff4500,0 0 10px #ff4500}
  50%{text-shadow:0 0 10px #ff4500,0 0 20px #ff4500}
  100%{text-shadow:0 0 5px #ff4500,0 0 10px #ff4500}
}
@media (min-width: 768px) {
  .cell { font-size: 20px; }
  #stats,#legend{font-size:16px}
  #stats2{font-size:13px}
  #log{height:120px;font-size:14px;min-height:8em}
  .action-button{padding:8px;font-size:16px;min-width:40px}
}
</style>
</head>
<body>
<div id="stats">HP: <span id="hp">10</span> / <span id="max-hp">10</span> | Depth: <span id="depth">1</span> | Best: <span id="best">1</span></div>
<div id="stats2">ATK: <span id="atk">1</span> | DEF: <span id="def">0</span></div>
<div id="legend">
  <span class="player">🧙</span>=You |
  <span class="enemy">👹</span>=Goblin |
  <span class="enemy">🕷️</span>=Spider |
  <span class="enemy">🐍</span>=Snake |
  <span class="boss">👺</span>=Boss |
  <span class="stairs">🚪</span>=Exit |
  <span class="item">💊</span>=Potion |
  <span class="item">⚔️</span>=Weapon |
  <span class="item">🛡️</span>=Armor
</div>
<div id="game"></div>
<div id="log"></div>
<div id="action-bar">
  <div id="row-1">
    <button class="action-button" onclick="movePlayer(0,-1)">↑</button>
  </div>
  <div id="row-2">
    <div>
      <button class="action-button" onclick="movePlayer(-1,0)">←</button>
      <button class="action-button" onclick="movePlayer(0,1)">↓</button>
      <button class="action-button" onclick="movePlayer(1,0)">→</button>
    </div>
    <div>
      <button class="action-button" onclick="showHelp()">?</button>
      <button class="action-button" onclick="restartGame()">Reset</button>
    </div>
  </div>
</div>

<div id="help" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;border:2px solid #444;padding:20px;z-index:100;max-width:90vw;">
  <p style="font-size:4vw;">↑↓←→: Move<br>?: Help<br>Reset: Restart<br>Enemies attack if adjacent!<br>💊: +3 HP<br>⚔️: +1 Attack<br>🛡️: +1 Defense<br>👺 Bosses appear every 5 depths<br>Find 🚪 to descend</p>
  <div style="text-align:center;margin-top:10px;padding:5px;background:#444;cursor:pointer;font-size:4vw;" onclick="hideHelp()">Close</div>
</div>

<script>
// ===== GAME STATE =====
const W=20,H=12;
const game={
  player:{x:1,y:1,hp:10,maxHp:10,atk:1,def:0},
  map:[],enemies:[],items:[],depth:1,gameOver:false,bestDepth:1
};

// ===== SAVE / LOAD BEST DEPTH =====
function loadBest() {
  try {
    const v = localStorage.getItem("dungeonCrawlerBestDepth");
    return v ? parseInt(v, 10) : 1;
  } catch(e) { return 1; }
}
function saveBest() {
  try { localStorage.setItem("dungeonCrawlerBestDepth", String(game.bestDepth)); } catch(e) {}
}

// ===== PATHFINDING (BFS) =====
function hasPath(startX, startY, endX, endY) {
  const visited = Array(H).fill().map(() => Array(W).fill(false));
  const queue = [{x: startX, y: startY}];
  visited[startY][startX] = true;
  while (queue.length > 0) {
    const {x, y} = queue.shift();
    if (x === endX && y === endY) return true;
    const neighbors = [{x:x+1,y:y},{x:x-1,y:y},{x:x,y:y+1},{x:x,y:y-1}];
    for (const n of neighbors) {
      if (n.x >= 0 && n.x < W && n.y >= 0 && n.y < H && !visited[n.y][n.x] && game.map[n.y][n.x] !== "🟫") {
        visited[n.y][n.x] = true;
        queue.push({x: n.x, y: n.y});
      }
    }
  }
  return false;
}

// ===== POSITION CHECKS =====
function isPositionFree(x, y) {
  if (x < 0 || x >= W || y < 0 || y >= H || game.map[y][x] !== "░") return false;
  if (Math.abs(x - game.player.x) + Math.abs(y - game.player.y) < 2) return false;
  if (game.map[y][x] === "🧙" || game.map[y][x] === "🚪" ||
      game.enemies.some(e => e.x === x && e.y === y) ||
      game.items.some(i => i.x === x && i.y === y)) {
    return false;
  }
  return true;
}

// ===== PLACEMENT WITH CHECKS =====
function placeAtReachablePosition(char, type) {
  let x, y, attempts = 0;
  do {
    x = Math.floor(Math.random() * W);
    y = Math.floor(Math.random() * H);
    attempts++;
    if (attempts > 20) return false;
  } while (!isPositionFree(x, y) || !hasPath(game.player.x, game.player.y, x, y));

  if (type === "stairs") { game.map[y][x] = "🚪"; }
  else if (type === "enemy") {
    const isBoss = char === "👺";
    const tier = Math.floor(game.depth / 3);
    const hp = isBoss ? (6 + game.depth) : (3 + tier);
    const damage = isBoss ? (2 + Math.floor(game.depth / 4)) : (1 + Math.floor(game.depth / 5));
    game.enemies.push({x, y, char, hp, maxHp: hp, damage, isBoss});
  }
  else if (type === "torch") { game.map[y][x] = "🔥"; }
  else if (type === "potion") { game.items.push({x, y, char: "💊", type: "potion", value: 3}); }
  else if (type === "weapon") { game.items.push({x, y, char: "⚔️", type: "weapon", value: 1}); }
  else if (type === "armor") { game.items.push({x, y, char: "🛡️", type: "armor", value: 1}); }
  return true;
}

// ===== DUNGEON GENERATION =====
function generateDungeon() {
  game.map=Array(H).fill().map(()=>Array(W).fill("🟫")); // Walls
  game.enemies=[];game.items=[];

  // Dig rooms (floors)
  for(let i=0;i<6;i++) {
    const w=3+Math.floor(Math.random()*5),h=3+Math.floor(Math.random()*4);
    const x=1+Math.floor(Math.random()*(W-w-1)),y=1+Math.floor(Math.random()*(H-h-1));
    for(let dy=0;dy<h;dy++) for(let dx=0;dx<w;dx++) game.map[y+dy][x+dx]="░";
  }

  // Place player
  let x,y;do{x=Math.floor(Math.random()*W);y=Math.floor(Math.random()*H)}while(game.map[y][x]!="░");
  game.player.x=x;game.player.y=y;game.map[y][x]="🧙";

  // Place stairs (door)
  if (!placeAtReachablePosition("🚪", "stairs")) generateDungeon();

  // Place torches (2-3 per level)
  for(let i=0;i<2+Math.floor(Math.random()*2);i++) {
    if (!placeAtReachablePosition("🔥", "torch")) break;
  }

  // Place enemies (a boss every 5th depth, plus regulars)
  const isBossLevel = game.depth % 5 === 0;
  if (isBossLevel) placeAtReachablePosition("👺", "enemy");
  const enemyCount = 2 + Math.floor(game.depth / 4);
  const enemyTypes = ["👹", "🕷️", "🐍"];
  for(let i=0;i<enemyCount;i++) {
    const char = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
    if (!placeAtReachablePosition(char, "enemy")) break;
  }

  // Place potions
  for(let i=0;i<2;i++) {
    if (!placeAtReachablePosition("💊", "potion")) break;
  }

  // Place weapon/armor occasionally
  if (Math.random() < 0.6) placeAtReachablePosition("⚔️", "weapon");
  if (Math.random() < 0.6) placeAtReachablePosition("🛡️", "armor");
}

// ===== RENDERING =====
function render() {
  let o = "";
  for(let y=0; y<H; y++) {
    for(let x=0; x<W; x++) {
      let c = game.map[y][x];
      let cls = "";
      const e = game.enemies.find(e=>e.x===x&&e.y===y);
      const it = e ? null : game.items.find(i=>i.x===x&&i.y===y);
      if (e) { c = e.char; cls = e.isBoss ? "boss" : "enemy"; }
      else if (it) { c = it.char; cls = "item"; }
      else if(c==="🟫") cls="wall";
      else if(c==="░") cls="floor";
      else if(c==="🧙") cls="player";
      else if(c==="🚪") cls="stairs";
      else if(c==="🔥") cls="torch";
      o += `<div class="cell ${cls}"><span>${c}</span></div>`;
    }
  }
  document.getElementById("game").innerHTML = o;
  document.getElementById("hp").textContent = game.player.hp;
  document.getElementById("max-hp").textContent = game.player.maxHp;
  document.getElementById("depth").textContent = game.depth;
  document.getElementById("best").textContent = game.bestDepth;
  document.getElementById("atk").textContent = game.player.atk;
  document.getElementById("def").textContent = game.player.def;
}

// ===== GAME LOGIC =====
function init() {
  game.player={x:1,y:1,hp:10,maxHp:10,atk:1,def:0};
  game.depth=1;game.gameOver=false;game.bestDepth=Math.max(loadBest(),1);
  generateDungeon();render();log("Welcome! Find 🚪 to descend.");
}

function log(msg) {const l=document.getElementById("log");l.innerHTML+=msg+"<br>";l.scrollTop=l.scrollHeight;}

function movePlayer(dx,dy) {
  if(game.gameOver) return;
  const nx=game.player.x+dx,ny=game.player.y+dy;
  if(nx<0||nx>=W||ny<0||ny>=H||game.map[ny][nx]==="🟫") {log("Can't move there!");return;}

  const ei=game.enemies.findIndex(e=>e.x===nx&&e.y===ny);
  if(ei!==-1) {combat(ei);return;}

  const ii=game.items.findIndex(i=>i.x===nx&&i.y===ny);
  if(ii!==-1) {pickUpItem(ii);return;}

  if(game.map[ny][nx]==="🚪") {nextLevel();return;}

  game.map[game.player.y][game.player.x]="░";game.player.x=nx;game.player.y=ny;game.map[ny][nx]="🧙";
  enemiesTurn();render();
}

function combat(ei) {
  const e=game.enemies[ei];
  let dmg = game.player.atk;
  const isCrit = Math.random() < 0.15;
  if (isCrit) dmg *= 2;
  e.hp -= dmg;
  log(isCrit ? `Critical hit! ${e.char} takes ${dmg} damage!` : `Hit ${e.char} for ${dmg} damage!`);
  if(e.hp<=0) {
    game.enemies.splice(ei,1);
    log(e.isBoss ? `Defeated the boss ${e.char}!` : "Killed enemy!");
    render();
    return;
  }
  const missed = Math.random() < 0.2;
  if (missed) {
    log(`${e.char} attacks but misses!`);
  } else {
    const taken = Math.max(1, e.damage - game.player.def);
    game.player.hp -= taken;
    log(`${e.char} hits you for ${taken} damage!`);
  }
  if(game.player.hp<=0) gameOver();
  render();
}

function pickUpItem(ii) {
  const i=game.items[ii];
  if(i.type==="potion") {
    game.player.hp=Math.min(game.player.hp+i.value, game.player.maxHp);
    log(`Drank potion! HP +${i.value} (now ${game.player.hp}/${game.player.maxHp})`);
  } else if(i.type==="weapon") {
    game.player.atk += i.value;
    log(`Found a weapon! ATK +${i.value} (now ${game.player.atk})`);
  } else if(i.type==="armor") {
    game.player.def += i.value;
    log(`Found armor! DEF +${i.value} (now ${game.player.def})`);
  }
  game.items.splice(ii,1);game.map[i.y][i.x]="░";render();
}

function enemiesTurn() {
  game.enemies.forEach(e=> {
    if(e.hp<=0) return;
    const dx=Math.abs(e.x-game.player.x),dy=Math.abs(e.y-game.player.y);
    if(dx+dy===1) { // Adjacent: attack!
      const missed = Math.random() < 0.2;
      if (missed) { log(`${e.char} attacks but misses!`); return; }
      const taken = Math.max(1, e.damage - game.player.def);
      game.player.hp-=taken;log(`${e.char} attacks! HP -${taken}`);
      if(game.player.hp<=0) gameOver();
      return;
    }
    // Move toward player
    const dirX=Math.sign(game.player.x-e.x),dirY=Math.sign(game.player.y-e.y);
    if(Math.random()<0.7) {
      const nx=e.x+dirX,ny=e.y+dirY;
      if(nx>=0&&nx<W&&ny>=0&&ny<H&&game.map[ny][nx]==="░") {
        e.x=nx;e.y=ny;
      }
    }
  });
}

function nextLevel() {
  game.depth++;game.player.hp=Math.min(game.player.hp+2,game.player.maxHp);
  if (game.depth > game.bestDepth) { game.bestDepth = game.depth; saveBest(); }
  log(`Depth ${game.depth}...`);
  if (game.depth % 5 === 0) log("You sense a powerful presence nearby...");
  generateDungeon();render();
}

function gameOver() {
  game.gameOver=true;
  log(`You died at depth ${game.depth}! Press Reset.`);
  if (game.depth > game.bestDepth) { game.bestDepth = game.depth; saveBest(); }
  render();
}

function showHelp() {document.getElementById("help").style.display="block";}
function hideHelp() {document.getElementById("help").style.display="none";}
function restartGame() {init();hideHelp();}

document.getElementById("game").addEventListener("click",(e)=> {
  if(game.gameOver) return;
  const rect = document.getElementById("game").getBoundingClientRect();
  const cw=rect.width/W,ch=rect.height/H;
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const x=Math.floor(cx/cw),y=Math.floor(cy/ch);
  const dx=x-game.player.x,dy=y-game.player.y;
  if(Math.abs(dx)+Math.abs(dy)===1) movePlayer(dx,dy);
});

document.addEventListener("keydown",(e)=> {
  if(game.gameOver) {if(e.key.toLowerCase()==="r") restartGame();return}
  if(e.key==="Escape") {hideHelp();return}
  const mk={ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0},w:{dx:0,dy:-1},s:{dx:0,dy:1},a:{dx:-1,dy:0},d:{dx:1,dy:0}};
  if(mk[e.key]) {movePlayer(mk[e.key].dx,mk[e.key].dy);return}
  if(e.key==="?") showHelp();
});

init();
</script>
</body>
</html>
