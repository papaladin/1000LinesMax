<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Dungeon Crawler</title>
<style>
body{font-family:monospace;background:#000;color:#fff;margin:0;padding:10px;touch-action:manipulation}
#game{white-space:pre-wrap;font-size:5vw;line-height:1.2;margin:5px 0;max-width:100vw;overflow-x:hidden;touch-action:manipulation}
#stats{margin-bottom:5px;font-size:4vw}
#legend{font-size:3vw;margin-bottom:5px;color:#888}
#log{height:10vw;overflow-y:auto;margin-bottom:5px;font-size:3vw}
#action-bar{display:flex;justify-content:center;gap:1vw;padding:1vw;background:#222;position:fixed;bottom:0;left:0;right:0}
.action-button{flex:1;padding:2vw;background:#333;border:1px solid #444;color:#fff;cursor:pointer;font-size:4vw}
.wall{color:#555}.player{color:#ff0}.enemy{color:#f00}.item{color:#0f0}.stairs{color:#0ff}
@media (min-width: 768px) {
  #game{font-size:20px}
  #stats,#legend{font-size:16px}
  #log{height:50px;font-size:14px}
  .action-button{padding:8px;font-size:16px}
}
</style>
</head>
<body>
<div id="stats">HP: <span id="hp">10</span> / <span id="max-hp">10</span> | Gold: <span id="gold">0</span> | Depth: <span id="depth">1</span></div>
<div id="legend">
  <span class="player">@</span>=You |
  <span class="enemy">g</span>=Goblin |
  <span class="item">!</span>=Potion |
  <span class="item">$</span>=Gold |
  <span class="stairs">></span>=Stairs
</div>
<div id="game"></div>
<div id="log"></div>
<div id="action-bar">
<button class="action-button" onclick="movePlayer(0,-1)">↑</button>
<button class="action-button" onclick="showHelp()">?</button>
<button class="action-button" onclick="movePlayer(-1,0)">←</button>
<button class="action-button" onclick="movePlayer(0,1)">↓</button>
<button class="action-button" onclick="movePlayer(1,0)">→</button>
<button class="action-button" onclick="restartGame()">R</button>
</div>

<div id="help" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;border:2px solid #444;padding:20px;z-index:100;">
  <p style="font-size:4vw;">↑↓←→: Move<br>?: Help<br>R: Restart<br>Enemies attack if adjacent!<br>Find &gt; to descend</p>
  <div style="text-align:center;margin-top:10px;padding:5px;background:#444;cursor:pointer;font-size:4vw;" onclick="hideHelp()">Close</div>
</div>

<script>
// ===== GAME STATE =====
const W=20,H=12,game={player:{x:1,y:1,hp:10,maxHp:10,gold:0},map:[],enemies:[],items:[],depth:1,gameOver:false};

// ===== PATHFINDING (BFS) =====
function hasPath(startX, startY, endX, endY) {
  const visited = Array(H).fill().map(() => Array(W).fill(false));
  const queue = [{x: startX, y: startY}];
  visited[startY][startX] = true;
  while (queue.length > 0) {
    const {x, y} = queue.shift();
    if (x === endX && y === endY) return true;
    const neighbors = [{x:x+1,y:y},{x:x-1,y:y},{x:x,y:y+1},{x:x,y:y-1}];
    for (const n of neighbors) {
      if (n.x >= 0 && n.x < W && n.y >= 0 && n.y < H && !visited[n.y][n.x] && game.map[n.y][n.x] !== "█") {
        visited[n.y][n.x] = true;
        queue.push({x: n.x, y: n.y});
      }
    }
  }
  return false;
}

// ===== POSITION CHECKS =====
function isPositionFree(x, y) {
  // Check if position is within bounds and is a floor tile
  if (x < 0 || x >= W || y < 0 || y >= H || game.map[y][x] !== ".") return false;
  // Check if position is not too close to player (for enemies)
  if (Math.abs(x - game.player.x) + Math.abs(y - game.player.y) < 2) return false;
  // Check if position doesn't overlap with existing entities
  if (game.map[y][x] === "@" || game.map[y][x] === ">" ||
      game.enemies.some(e => e.x === x && e.y === y) ||
      game.items.some(i => i.x === x && i.y === y)) {
    return false;
  }
  return true;
}

// ===== PLACEMENT WITH CHECKS =====
function placeAtReachablePosition(char, type, object) {
  let x, y, attempts = 0;
  do {
    x = Math.floor(Math.random() * W);
    y = Math.floor(Math.random() * H);
    attempts++;
    if (attempts > 20) return false;
  } while (!isPositionFree(x, y) || !hasPath(game.player.x, game.player.y, x, y));

  game.map[y][x] = char;
  if (type === "stairs") game.map[y][x] = ">";
  else if (type === "enemy") game.enemies.push({x, y, char, hp: 3, damage: 1});
  else if (type === "item") game.items.push({x, y, char, type: object.type, value: object.value});
  return true;
}

// ===== DUNGEON GENERATION =====
function generateDungeon() {
  game.map=Array(H).fill().map(()=>Array(W).fill("█"));
  game.enemies=[];game.items=[];

  // Dig rooms
  for(let i=0;i<6;i++) {
    const w=3+Math.floor(Math.random()*5),h=3+Math.floor(Math.random()*4);
    const x=1+Math.floor(Math.random()*(W-w-1)),y=1+Math.floor(Math.random()*(H-h-1));
    for(let dy=0;dy<h;dy++) for(let dx=0;dx<w;dx++) game.map[y+dy][x+dx]=".";
  }

  // Place player
  let x,y;do{x=Math.floor(Math.random()*W);y=Math.floor(Math.random()*H)}while(game.map[y][x]!=".");
  game.player.x=x;game.player.y=y;game.map[y][x]="@";

  // Place stairs (guaranteed reachable and not overlapping)
  if (!placeAtReachablePosition(">", "stairs", {})) generateDungeon();

  // Place enemies (guaranteed reachable, not overlapping, not adjacent to player)
  for(let i=0;i<3;i++) {
    if (!placeAtReachablePosition("g", "enemy", {})) break;
  }

  // Place items (guaranteed reachable and not overlapping)
  for(let i=0;i<3;i++) {
    const itemType = Math.random() < 0.7 ? {type:"potion",value:3} : {type:"gold",value:5};
    if (!placeAtReachablePosition("!", "item", itemType)) break;
  }
}

// ===== RENDERING =====
function render() {
  let o="";for(let y=0;y<H;y++) {for(let x=0;x<W;x++) {
    let c=game.map[y][x],cls="";if(x===game.player.x&&y===game.player.y){c="@";cls="player"}
    else if(game.enemies.some(e=>e.x===x&&e.y===y)){cls="enemy"}
    else if(game.items.some(i=>i.x===x&&i.y===y)){cls="item"}
    else if(c===">"){cls="stairs"}else if(c==="█"){cls="wall"}
    o+=`<span class="${cls}">${c}</span>`;}o+="<br>";}
  document.getElementById("game").innerHTML=o;
  document.getElementById("hp").textContent=game.player.hp;
  document.getElementById("max-hp").textContent=game.player.maxHp;
  document.getElementById("gold").textContent=game.player.gold;
  document.getElementById("depth").textContent=game.depth;
}

// ===== GAME LOGIC =====
function init() {
  game.player={x:1,y:1,hp:10,maxHp:10,gold:0};game.depth=1;game.gameOver=false;
  generateDungeon();render();log("Welcome! Find > to descend.");
}

function log(msg) {const l=document.getElementById("log");l.innerHTML+=msg+"<br>";l.scrollTop=l.scrollHeight;}

function movePlayer(dx,dy) {
  if(game.gameOver) return;
  const nx=game.player.x+dx,ny=game.player.y+dy;
  if(nx<0||nx>=W||ny<0||ny>=H||game.map[ny][nx]==="█") {log("Can't move there!");return;}

  const ei=game.enemies.findIndex(e=>e.x===nx&&e.y===ny);
  if(ei!==-1) {combat(ei);return;}

  const ii=game.items.findIndex(i=>i.x===nx&&i.y===ny);
  if(ii!==-1) {pickUpItem(ii);return;}

  if(game.map[ny][nx]===">") {nextLevel();return;}

  game.map[game.player.y][game.player.x]=".";game.player.x=nx;game.player.y=ny;game.map[ny][nx]="@";
  enemiesTurn();render();
}

function combat(ei) {
  const e=game.enemies[ei];
  e.hp--;log(`Hit ${e.char} for 1 damage!`);
  if(e.hp<=0) {game.enemies.splice(ei,1);game.map[e.y][e.x]=".";log("Killed enemy!");return;}
  game.player.hp-=e.damage;log(`${e.char} hits you for ${e.damage} damage!`);
  if(game.player.hp<=0) gameOver();
}

function enemiesTurn() {
  game.enemies.forEach(e=> {
    if(e.hp<=0) return;

    // Check if enemy is adjacent to player (attack immediately)
    const dx = Math.abs(e.x - game.player.x);
    const dy = Math.abs(e.y - game.player.y);
    if (dx + dy === 1) { // Adjacent
      game.player.hp -= e.damage;
      log(`${e.char} attacks! HP -${e.damage}`);
      if(game.player.hp <= 0) gameOver();
      return; // Skip movement if attacked
    }

    // Otherwise, move toward player
    const dirX = Math.sign(game.player.x - e.x);
    const dirY = Math.sign(game.player.y - e.y);
    if(Math.random() < 0.7) { // 70% chance to move
      const nx = e.x + dirX;
      const ny = e.y + dirY;
      if(nx >= 0 && nx < W && ny >= 0 && ny < H && game.map[ny][nx] === ".") {
        game.map[e.y][e.x] = ".";
        e.x = nx;
        e.y = ny;
        game.map[ny][nx] = e.char;
      }
    }
  });
}

function pickUpItem(ii) {
  const i=game.items[ii];
  if(i.type==="potion") {
    game.player.hp=Math.min(game.player.hp+i.value, game.player.maxHp);
    log(`Drank potion! HP +${i.value} (now ${game.player.hp}/${game.player.maxHp})`);
  } else if(i.type==="gold") {
    game.player.gold+=i.value;
    log(`Found ${i.value} gold!`);
  }
  game.items.splice(ii,1);game.map[i.y][i.x]=".";render();
}

function nextLevel() {
  game.depth++;game.player.hp=Math.min(game.player.hp+2, game.player.maxHp);
  log(`Depth ${game.depth}...`);generateDungeon();
}

function gameOver() {game.gameOver=true;log("You died! Press R to restart.");}

function showHelp() {document.getElementById("help").style.display="block";}
function hideHelp() {document.getElementById("help").style.display="none";}
function restartGame() {init();hideHelp();}

document.getElementById("game").addEventListener("click",(e)=> {
  if(game.gameOver) return;
  const cw=e.target.clientWidth/W,ch=e.target.clientHeight/H;
  const x=Math.floor(e.offsetX/cw),y=Math.floor(e.offsetY/ch);
  const dx=x-game.player.x,dy=y-game.player.y;
  if(Math.abs(dx)+Math.abs(dy)===1) movePlayer(dx,dy);
});

document.addEventListener("keydown",(e)=> {
  if(game.gameOver) {if(e.key.toLowerCase()==="r") restartGame();return}
  if(e.key==="Escape") {hideHelp();return}
  const mk={ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0},w:{dx:0,dy:-1},s:{dx:0,dy:1},a:{dx:-1,dy:0},d:{dx:1,dy:0}};
  if(mk[e.key]) {movePlayer(mk[e.key].dx,mk[e.key].dy);return}
  if(e.key==="?") showHelp();
});

init();
</script>
</body>
</html>
