<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 Lines Max Games</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            background-color: #2a2a2a;
        }

        .game-card h2 {
            margin: 0 0 10px 0;
            color: #ffd700;
            font-size: 1.2em;
        }

        .game-card p {
            margin: 0;
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .game-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        footer {
            margin-top: 40px;
            color: #666;
            font-size: 0.8em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎮 1000 Lines Max Games</h1>

    <div class="game-grid">
        <!-- Game 1: Dungeon Crawler -->
        <a href="1000linesDungeon.html" class="game-card">
            <div class="game-icon">🏰</div>
            <h2>Dungeon Crawler</h2>
            <p>Procedural roguelike with ASCII/SVG graphics, combat, magic, and more.</p>
        </a>

        <!-- Add more games here as you create them -->
        <!-- Example:
        <a href="1000linesSpace.html" class="game-card">
            <div class="game-icon">🚀</div>
            <h2>Space Explorer</h2>
            <p>Fly through the galaxy in this 1000-line space adventure.</p>
        </a>
        -->
    </div>

    <footer>
        <p>All games are &lt;1000 lines of code. No build step, no assets, just HTML/JS/CSS.</p>
        <p>Hosted on <a href="https://github.com/papaladin/1000LinesMax" style="color: #55aaff;">GitHub</a>.</p>
    </footer>
</body>
</html>
